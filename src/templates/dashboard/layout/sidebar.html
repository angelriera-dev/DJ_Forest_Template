<aside id="sidebar" class="
fixed
h-full
flex
  flex-col
  border-r
  border-base-200
  bg-base-100">


  <div class="flex items-center gap-3 border-200/60  p-4 rounded-box w-full">

    {% include 'components/Layout/Brand.html' %}
  </div>

  <nav class="mb-auto flex-1 p-4">
    <ul class="menu rounded-box gap-1 w-full">
      {% for link in nav_items %}
      {% url link.url as current_url %}
      <li>
        <a href="{{ current_url }}"
          class="{% if request.path == current_url %}menu-active{% endif %} flex items-center gap-2 px-2.5 py-2 rounded-md transition-colors">

          {% if link.icon|slice:":3" == "fa-" %}

          <i class="{{ link.icon }} w-5 text-center text-base-content/60 leading-none"></i>
          {% else %}
          <span>{{ link.icon }}</span>
          {% endif %}

          <span>{{ link.name }}</span>



        </a>
      </li>
      {% endfor %}
    </ul>
  </nav>


  <!-- footer -->
  <div class="mt-auto border-t border-base-200 bg-base-200/60 p-4">
    <p class="text-sm font-medium">Account</p>
    <p class="mt-1 text-xs text-base-content/60">{{ user.email }}</p>
    <div class="mt-4 flex items-center gap-2">
      <a href="{% url 'account_logout' %}"
        class="btn btn-ghost btn-sm btn-block justify-start px-0 text-base-content/70 hover:text-error">
        <i class="fa-solid fa-right-from-bracket w-4 text-error/70"></i>
        Log out
      </a>
    </div>
  </div>

</aside>
