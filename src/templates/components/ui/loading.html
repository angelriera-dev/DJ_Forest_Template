{% comment %}
Usage:
  <div hx-post="..." hx-indicator="#loading">...</div>
  {% include "components/ui/loading.html" with id="loading" %}
{% endcomment %}
<div id="{{ id|default:'loading' }}"
     class="htmx-indicator fixed inset-0 z-[1000] flex items-center justify-center bg-base-100/50 backdrop-blur-sm transition-all duration-300">
    <div class="flex flex-col items-center gap-3 p-6 bg-base-100 rounded-2xl shadow-xl border border-base-200">
        <span class="loading loading-spinner loading-lg text-primary"></span>
        <span class="text-sm font-medium animate-pulse">{{ text|default:"Processing..." }}</span>
    </div>
</div>
