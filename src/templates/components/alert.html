{% comment %}
Usage: {% include "components/alert.html" with type="success" icon="fa-check" text="Success!" dismissible=True %}
{% endcomment %}
<div x-data="{ show: true }"
     x-show="show"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 transform -translate-y-2"
     x-transition:leave="transition ease-in duration-300 transform opacity-0 scale-95"
     class="alert{% if type %} alert-{{ type }}{% else %} alert-info{% endif %}{% if class %} {{ class }}{% endif %} items-start shadow-sm border"
     role="alert">
  {% if icon %}<i class="{{ icon }} mt-0.5"></i>{% endif %}
  <span class="leading-6">{{ text }}</span>
  {% if dismissible %}
  <button class="btn btn-sm btn-circle btn-ghost -mt-1 -mr-2" @click="show = false">
    <i class="fa-solid fa-xmark"></i>
  </button>
  {% endif %}
</div>
